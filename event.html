
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Event - TixTrust</title>

<style>

body{
font-family:Arial;
background:#0b0f1a;
color:white;
margin:0;
}

.container{
width:90%;
margin:auto;
padding:40px 0;
}

.event-header{
display:flex;
gap:40px;
margin-bottom:40px;
}

.event-header img{
width:400px;
border-radius:10px;
}

.event-info h1{
margin:0;
}

.ticket-list{
background:#111827;
padding:20px;
border-radius:10px;
}

.ticket-row{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #333;
}

.buy{
background:#ff7a00;
padding:8px 20px;
border-radius:5px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="event-header">

<img src="https://images.unsplash.com/photo-1506157786151-b8491531f063">

<div class="event-info">

<h1>Tomorrowland Thailand</h1>

<p>Date: Dec 2026</p>

<p>Location: Bangkok</p>

<p>Available Tickets</p>

</div>

</div>


<div class="ticket-list">

<div class="ticket-row">
<span>VIP Zone</span>
<span>$900</span>
<a class="buy" href="checkout.html">Buy</a>
</div>

<div class="ticket-row">
<span>GA Zone</span>
<span>$500</span>
<a class="buy" href="checkout.html">Buy</a>
</div>

<div class="ticket-row">
<span>Balcony</span>
<span>$700</span>
<a class="buy" href="checkout.html">Buy</a>
</div>

</div>

</div>

</body>
</html>
