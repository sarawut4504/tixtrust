<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - TixTrust</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-1: #0f172a;
            --bg-color-2: #1e293b;
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.4);
        }

        /* --- Main Background with Gradient Motion --- */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Hide scrollbars, elements float freely */
            font-family: 'Kanit', 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #111827, #1e293b, #0c4a6e);
            background-size: 400% 400%;
            animation: gradient-flow 15s ease infinite;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Circuit & Glowing Floating Elements --- */
        .decoration {
            position: fixed;
            pointer-events: none; /* Can't click decorations */
            opacity: 0.2;
            filter: blur(1px);
        }

        /* Large Circuit lines */
        .circuit {
            top: 10%; left: 5%;
            width: 30vw; height: 30vh;
            background: 
                linear-gradient(90deg, var(--accent-blue) 2px, transparent 2px) 0 0,
                linear-gradient(0deg, var(--accent-blue) 2px, transparent 2px) 0 0;
            background-size: 10% 10%;
            mask-image: linear-gradient(to bottom right, black, transparent);
            -webkit-mask-image: linear-gradient(to bottom right, black, transparent);
        }

        /* Floating Shapes */
        .floating-shape {
            position: absolute;
            background: rgba(56, 189, 248, 0.15);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            animation: float 20s ease-in-out infinite;
        }

        .shape1 { width: 80px; height: 80px; top: 15%; right: 10%; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); animation-delay: 2s; }
        .shape2 { width: 50px; height: 50px; bottom: 15%; left: 12%; border-radius: 5px; animation-delay: 5s;}

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(10deg); }
        }

        /* --- Floating Icons --- */
        .floating-icon {
            position: absolute;
            font-size: 30px;
            animation: icon-float 10s ease-in-out infinite alternate;
            opacity: 0.6;
            filter: grayscale(30%);
            transition: 0.3s;
        }

        .floating-icon:hover {
            opacity: 1;
            filter: grayscale(0%);
            transform: scale(1.2) rotate(5deg);
        }

        .icon-ticket { top: 25%; left: 8%; animation-delay: 1s; }
        .icon-gear { bottom: 25%; right: 10%; animation-delay: 3s; }
        .icon-shield { top: 40%; right: 15%; animation-delay: 6s;}

        @keyframes icon-float {
            0% { transform: translate(0, 0) rotate(-5deg); }
            100% { transform: translate(15px, 20px) rotate(5deg); }
        }

        /* --- Main Content Card --- */
        .main-card {
            max-width: 950px;
            width: 90%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 36px;
            padding: 60px 50px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            z-index: 10;
            overflow: hidden;
            transform: translateY(20px);
            animation: card-appear 1s ease-out forwards;
        }

        @keyframes card-appear {
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- TixTrust Logo Area --- */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: #fff;
            transition: 0.3s;
            cursor: pointer;
        }

        .logo span { color: var(--accent-blue); }

        .logo-area:hover .logo {
            transform: scale(1.05);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .mega-phone { font-size: 2.5rem; animation: wobble 3s infinite; }

        @keyframes wobble {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        /* --- Headings --- */
        .main-heading {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .sub-heading {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* --- Dual Column Layout --- */
        .content-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            text-align: left;
            margin-bottom: 50px;
        }

        .lang-section h2 {
            font-size: 1.6rem;
            color: var(--accent-blue);
            margin-bottom: 18px;
        }

        .lang-section p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #cbd5e1;
            font-weight: 300;
            transition: 0.3s;
        }

        .content-grid:hover p {
            color: #e2e8f0;
        }

        /* --- Central Rocket Group (from image) --- */
        .rocket-group {
            grid-column: span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            position: relative;
        }

        .central-rocket {
            font-size: 100px;
            transform: rotate(-30deg);
            animation: central-float 8s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.4));
            transition: 0.4s;
            cursor: pointer;
        }

        .central-rocket:hover {
            transform: scale(1.1) rotate(-20deg) translate(0, -10px);
            filter: drop-shadow(0 0 25px rgba(251, 191, 36, 0.7));
        }

        .gear-decor {
            position: absolute;
            font-size: 30px;
            color: #94a3b8;
            opacity: 0.7;
            animation: spin 6s linear infinite;
        }
        .gear1 { top: -20px; left: calc(50% - 60px); }
        .gear2 { bottom: 0px; left: calc(50% - 100px); animation-direction: reverse; }

        .lock-decor {
            position: absolute;
            bottom: -10px;
            right: calc(50% - 50px);
            font-size: 25px;
            color: var(--accent-gold);
            animation: lock-bob 3s ease-in-out infinite;
        }

        @keyframes central-float {
            0%, 100% { transform: translateY(0) rotate(-30deg); }
            50% { transform: translateY(-20px) rotate(-25deg); }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes lock-bob { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* --- Footer Crowd (Bottom of card) --- */
        .card-footer {
            background: rgba(251, 191, 36, 0.05); /* Very slight tint */
            padding: 30px;
            border-top: 1px solid rgba(251, 191, 36, 0.1);
            border-radius: 0 0 36px 36px;
            margin: -20px -50px -60px; /* Expand to fill bottom of parent */
            position: relative;
            z-index: 5;
            transition: 0.3s;
        }

        /* Concert Crowd silhouette effect */
        .crowd-line {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 60px;
            background: linear-gradient(to top, #000, transparent);
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" preserveAspectRatio="none"><path d="M0,80 Q50,70 100,80 T200,80 Q250,90 300,80 T400,80 Q450,70 500,80 T600,80 Q650,90 700,80 T800,80 Q850,70 900,80 T1000,80 V100 H0 Z" fill="black"/></svg>');
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" preserveAspectRatio="none"><path d="M0,80 Q50,70 100,80 T200,80 Q250,90 300,80 T400,80 Q450,70 500,80 T600,80 Q650,90 700,80 T800,80 Q850,70 900,80 T1000,80 V100 H0 Z" fill="black"/></svg>');
            mask-size: cover;
            -webkit-mask-size: cover;
            opacity: 0.5;
        }

        .card-footer:hover {
            background: rgba(251, 191, 36, 0.1);
        }

        .footer-text {
            color: var(--accent-gold);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Small Rocket in footer text */
        .footer-text span {
            display: inline-block;
            animation: footer-rocket 1s ease-in infinite alternate;
        }

        @keyframes footer-rocket { to { transform: translate(3px, -3px); } }
